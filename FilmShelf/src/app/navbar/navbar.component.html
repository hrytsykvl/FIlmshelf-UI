  <ul class="nav-links">

    <li>
      <a [routerLink]="['/login']">Login</a>
    </li>
    <li>
      <a [routerLink]="['/register']">Register</a>
    </li>

    <li>
      <a [routerLink]="['/watchlist']" class="watchlist">
        <bookmark-solid-icon class="bookmark-icon" />

      </a>

      <user-circle-solid-icon class="user-icon" />

      <div class="dropdown-menu">
        <a [routerLink]="['/watchlist']">Your watchlist</a>

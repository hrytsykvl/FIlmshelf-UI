<div class="container">
  <div class="header">
    <h2 class="title">{{ 'customLists.heading' | translate }}</h2>

    <button class="create-button" [routerLink]="['/create-list']">
      {{ 'customLists.button.createList' | translate }}
    </button>
  </div>

  <hr class="separator" />

  <div class="lists-container">
    <app-custom-list
      *ngFor="let list of userLists"
      [watchlistId]="list.watchlistId"
      [title]="list.title"
      [movieIds]="list.movieIds"
      (deleteClicked)="onDeleteWatchlist(list.watchlistId)"
    >
    </app-custom-list>
  </div>
</div>

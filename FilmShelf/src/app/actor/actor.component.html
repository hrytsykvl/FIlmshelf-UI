<div class="cast-member" (click)="onActorClicked()">
  <img
    [src]="actor().profilePath"
    alt="{{ actor().name }}"
    class="cast-image"
  />
  <div class="cast-info">
    <p class="cast-name">{{ actor().name }}</p>
    <p class="cast-character">{{ 'actor.role.as' | translate }} {{ actor().character }}</p>
  </div>
</div>

name: UI - Build and Deploy

on:
  push:
    branches: [main]
    paths:
      - 'FilmShelf/**'
      - '.github/workflows/ui-deploy.yml'
  pull_request:
    branches: [main]
    paths:
      - 'FilmShelf/**'
  workflow_dispatch:

permissions:
  id-token: write   # required for Azure OIDC login
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: filmshelf-ui
      REGISTRY: ${{ vars.ACR_NAME }}.azurecr.io
      CONTEXT: ./FilmShelf

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image tag
        id: tag
        run: echo "value=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      # Azure login + ACR push happen only on main / manual runs.
      # PRs just verify the Docker build succeeds.
      - name: Azure login (OIDC)
        if: github.event_name != 'pull_request'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        if: github.event_name != 'pull_request'
        run: az acr login --name ${{ vars.ACR_NAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (and push on main)
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.CONTEXT }}
          file: ${{ env.CONTEXT }}/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.value }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          build-args: |
            API_BASE_URL=${{ vars.API_BASE_URL }}
            BASE_URL=${{ vars.BASE_URL }}
            GOOGLE_CLIENT_ID=${{ vars.GOOGLE_CLIENT_ID }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Container App
        if: github.event_name != 'pull_request'
        run: |
          az containerapp update \
            --name ${{ vars.CONTAINER_APP_NAME }} \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.value }}

      - name: Output app URL
        if: github.event_name != 'pull_request'
        run: |
          FQDN=$(az containerapp show \
            --name ${{ vars.CONTAINER_APP_NAME }} \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn -o tsv)
          echo "Deployed: https://$FQDN" >> "$GITHUB_STEP_SUMMARY"
